<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Clauge Pro</title>
<meta name="description" content="Your Clauge Pro subscription is active. Return to the app to continue.">
<meta name="theme-color" content="#fafaf8">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Clauge">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="site.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .us-wrap {
    position: relative; z-index: 1;
    width: min(560px, calc(100% - 48px));
    padding: 48px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--bg-1);
    box-shadow: 0 24px 70px -36px rgba(22, 24, 29, 0.25);
  }
  .us-rail {
    display: grid;
    grid-template-columns: max-content 1fr max-content;
    gap: 18px; align-items: center;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 30px;
  }
  .us-rail .line { height: 1px; background: var(--line); }
  .us-logo { width: 44px; height: 44px; margin-bottom: 20px; }
  .us-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--lime);
    border: 1px solid var(--lime-line); border-radius: 999px;
    background: rgba(90, 80, 232, 0.06);
    padding: 6px 13px;
    margin-bottom: 20px;
  }
  .us-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(34px, 4.8vw, 52px);
    line-height: 1.02; letter-spacing: -0.03em;
    color: var(--ink);
    margin: 0 0 14px;
  }
  .us-title em {
    font-style: normal;
    background: linear-gradient(110deg, var(--lime) 10%, var(--cyan) 60%, var(--violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .us-sub {
    font-size: 14.5px; line-height: 1.65;
    color: var(--ink-dim);
    margin: 0 0 28px;
    max-width: 44ch;
  }
  .us-actions { display: flex; flex-wrap: wrap; gap: 12px; }
</style>
</head>
<body>
<div class="bg-field" aria-hidden="true"></div>
<div class="us-wrap">
  <div class="us-rail">
    <span class="key">RECEIPT / 00</span>
    <span class="line"></span>
    <span class="end">clauge.in</span>
  </div>

  <img class="us-logo" src="clauge-mark.svg" alt="" />

  <span class="us-eyebrow">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    Payment received
  </span>

  <h1 class="us-title">Welcome to<br /><em>Clauge Pro.</em></h1>
  <p class="us-sub">Your subscription is active. Return to the app to continue where you left off.</p>

  <div class="us-actions">
    <button type="button" class="btn btn-primary btn-sm" id="open-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
      </svg>
      Open Clauge
    </button>
    <a class="btn btn-ghost btn-sm" href="/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/>
      </svg>
      Home
    </a>
  </div>
</div>

<script>
(() => {
  // Build the deep link from the current query string. Polar appends
  // ?ref=<user_id>&plan=<monthly|yearly|lifetime>&customer_session_token=<...>.
  // The desktop app's deep-link handler reads those off the URL.
  const qs = window.location.search || '';
  const deepLink = 'clauge://checkout-success' + qs;

  function openInApp() { window.location.href = deepLink; }

  // Best-effort auto-open on first paint so users with Clauge installed
  // land back in the app without clicking. Manual button is the fallback.
  setTimeout(openInApp, 400);

  document.getElementById('open-btn').addEventListener('click', openInApp);
})();
</script>
</body>
</html>
