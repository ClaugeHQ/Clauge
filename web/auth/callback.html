<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clauge — Connecting to GitHub</title>
<meta name="theme-color" content="#fafaf8">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="../site.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .card {
    position: relative; z-index: 1;
    text-align: center;
    width: min(480px, calc(100% - 48px));
    padding: 44px 40px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: var(--bg-1);
    box-shadow: 0 24px 70px -36px rgba(22, 24, 29, 0.25);
  }
  .card img { margin: 0 auto 18px; }
  h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 24px; letter-spacing: -0.02em;
    color: var(--ink); margin-bottom: 12px;
  }
  p { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-dim); line-height: 1.65; margin-bottom: 4px; }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--line-strong); border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #d0453e; }
  .success { color: #1a9e54; }
  a { color: var(--lime); border-bottom: 1px dashed currentColor; }
  a:hover { color: var(--cyan); }
</style>
</head>
<body>
<div class="bg-field" aria-hidden="true"></div>
<div class="card">
  <img src="../clauge-mark.svg" alt="Clauge" style="width:64px;height:64px;margin-bottom:16px;" />
  <h1 id="title">Connecting to GitHub…</h1>
  <div class="spinner" id="spinner"></div>
  <p id="message">Handing off to Clauge…</p>
</div>
<script>
(() => {
  const title = document.getElementById('title');
  const message = document.getElementById('message');
  const spinner = document.getElementById('spinner');

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    title.textContent = 'Authorization Failed';
    message.innerHTML = '<span class="error">GitHub returned: ' + escapeHtml(error) + '</span><br><br>Close this tab and try again from Clauge.';
    spinner.style.display = 'none';
    return;
  }

  if (!code) {
    title.textContent = 'Missing Authorization Code';
    message.innerHTML = '<span class="error">No code received from GitHub.</span><br><br>Close this tab and try again from Clauge.';
    spinner.style.display = 'none';
    return;
  }

  title.textContent = 'Opening Clauge…';
  message.innerHTML = 'If the app does not open automatically, <a id="manual-link" href="#">click here</a>.';
  spinner.style.display = 'none';

  const deepLink = 'clauge://oauth-callback?provider=github&code=' + encodeURIComponent(code);
  document.getElementById('manual-link').href = deepLink;
  window.location.href = deepLink;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
